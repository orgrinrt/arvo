project_name = "arvo"
crate_prefix = "arvo"
abi_version = 1

proc_macro_crates = []
module_crates = []

# Which macro to track per-crate in domain items
primary_domain_macro = "strategy"
primary_domain_label = "Strategies"

# Layer labels by depth index (L0 → L3)
layers = ["L0 primitives", "L1 contracts", "L2 substrate", "L2 substrate", "L2 substrate", "L2 substrate", "L3 spectral"]

# Domain kind labels for STRUCTURE.md domain items table
[domain_kinds]
strategy = "🎛️ strategy marker"

# Known macros for DESIGN.md table (description | usage)
[known_macros]

# Crate header colors for dependency graph (bg_color | fg_color)
[crate_colors]
arvo = "#E8EEF7 | #3A6EA5"
arvo-bits = "#E8EEF7 | #3A6EA5"
arvo-bitmask = "#E6F2E6 | #2D6A2D"
arvo-hash = "#E6F2E6 | #2D6A2D"
arvo-sparse = "#E6F2E6 | #2D6A2D"
arvo-graph = "#E6F2E6 | #2D6A2D"
arvo-comb = "#E6F2E6 | #2D6A2D"
arvo-spectral = "#EDE6F3 | #5C2D82"

# ---------------------------------------------------------------------------
# Lint configuration
# ---------------------------------------------------------------------------
#
# Per-gate severity: commit (pre-commit hook), build (standalone
# `cargo mock`), push (pre-push hook). Levels: off / info / warn / error.
# Violations at `error` fail the gate. Presets are documented in
# mock/agent/skills/lint-rules/SKILL.md.

# --- Universal quality lints (mockspace built-ins) -------------------------

[lints.no-empty-crate]
commit = "off"
build = "warn"
push = "warn"

[lints.no-todo]
commit = "off"
build = "warn"
push = "error"

[lints.file-size]
commit = "warn"
build = "error"
push = "error"
max_lines = "500"

# --- arvo custom lints (mock/lints/*.rs) -----------------------------------

[lints.no-std-enforcer]
commit = "error"
build = "error"
push = "error"

[lints.no-alloc-enforcer]
commit = "error"
build = "error"
push = "error"

[lints.no-dynamic-dispatch]
commit = "error"
build = "error"
push = "error"

[lints.strategy-marker-required]
commit = "warn"
build = "warn"
push = "error"

[lints.arvo-bits-traits-only]
commit = "error"
build = "error"
push = "error"

[lints.no-runtime-grow]
commit = "warn"
build = "warn"
push = "warn"

# --- Layer enforcement via forbidden-imports -------------------------------
#
# The L0 → L1 → L2 → L3 dependency table from mock/DESIGN.md.tmpl,
# encoded as import rules. A crate violates the rule if it imports
# any path listed under `forbidden` for its scope. {prefix} expands
# to crate_prefix ("arvo").

[lints.forbidden-imports]
commit = "warn"
build = "error"
push = "error"
rules = [
    # L0 — arvo has no intra-arvo deps, and no std/alloc.
    { scope = "arvo", forbidden = "std::*, alloc::*, arvo_bits::*, arvo_bitmask::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "L0 is the root of the arvo stack — no deps and no alloc/std" },

    # L1 — arvo-bits depends on arvo only. No concrete storage.
    { scope = "arvo-bits", forbidden = "std::*, alloc::*, arvo_bitmask::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "L1 contracts depend only on L0 (arvo); concrete storage lives in arvo-bitmask" },

    # L2 — arvo-bitmask depends on arvo-bits only.
    { scope = "arvo-bitmask", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-bitmask is L2 storage on arvo-bits contracts; must not depend on other L2/L3 crates" },

    # L2 — arvo-hash depends on arvo-bits only. Hash-domain types + algo contracts.
    { scope = "arvo-hash", forbidden = "std::*, alloc::*, arvo_bitmask::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-hash is L2 hash-domain surface on arvo-bits contracts; must not depend on other L2/L3 crates" },

    # L2 algorithm crates — depend on arvo + arvo-bitmask (not bits directly).
    { scope = "arvo-graph", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-graph depends on arvo + arvo-bitmask only" },
    { scope = "arvo-sparse", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-sparse depends on arvo + arvo-bitmask only" },
    { scope = "arvo-comb", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_sparse::*, arvo_spectral::*", reason = "arvo-comb depends on arvo + arvo-bitmask only" },

    # L3 — arvo-spectral depends on arvo + arvo-bitmask (Mask64 partition outputs this round).
    { scope = "arvo-spectral", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*", reason = "arvo-spectral depends on arvo + arvo-bitmask (Mask64 for partition outputs); arvo-sparse is a future-round dep per BACKLOG" },

    # Universal — no ad-hoc threading, clocks, filesystem anywhere.
    { scope = "*", forbidden = "std::thread::*, std::time::*, std::fs::*, std::net::*, std::process::*, std::io::*", reason = "arvo has zero platform dep; syscalls belong in consumer crates" },
]

# ---------------------------------------------------------------------------
# External lint packs (mockspace #94 feature)
# ---------------------------------------------------------------------------
#
# Shared stack-wide lint rules. Lives as a standalone crate so arvo,
# hilavitkutin, and clause stay in sync on vocabulary discipline.
#
# Git-based dep spec only — committed config must be portable across
# machines. For local iteration use `[patch]` in `.cargo/config.toml`.

[lint-crates]
mockspace-hilavitkutin-stack-lints = { git = "ssh://git@github.com/orgrinrt/mockspace-hilavitkutin-stack-lints.git", branch = "main" }

# Writing-style gate — pre-existing docs trip this until sweeps tidy them.
[lints.writing-style]
severity = "advisory"

# ---------------------------------------------------------------------------
# Graceful ramp for bare-primitive lints (temporary)
# ---------------------------------------------------------------------------
#
# The bare-primitive family fires on 259 pre-existing L2/L3 drift sites in
# arvo-bitmask / arvo-hash / arvo-graph / arvo-sparse / arvo-comb /
# arvo-spectral that were invisible to the previous lib.rs-only lint scope.
# Each is a legitimate target for the upcoming algorithm-crate sweep round;
# none are introductions (arvo L0 and arvo-bits L1 are already exempt via
# [primitive-introductions] below).
#
# Ramp severity to `warn` at every gate while the sweep lands. Commit + push
# succeed with the warning visible; agents still see the violation in local
# cargo mock output. FLIP BACK TO `error` when the L2/L3 sweep completes.
# Tracked: sweep-in-flight rounds under #71 + per-algo-crate follow-ups.

[lints.no-bare-numeric]
severity = "warn"

[lints.arvo-types-only]
severity = "warn"

[lints.no-bare-option]
severity = "warn"

[lints.no-bare-result]
severity = "warn"

[lints.no-bare-string]
severity = "warn"

[lints.no-public-raw-field]
severity = "warn"

# ---------------------------------------------------------------------------
# Primitive-introductions — per-crate per-primitive lint exemption
# ---------------------------------------------------------------------------
#
# Maps crate directory name to the list of primitive tokens the crate
# legitimately introduces in its own source because it is the producer of
# the wrapped equivalent. Bare-primitive lints (no-bare-numeric,
# arvo-types-only, no-public-raw-field, etc.) skip these specific tokens
# on these specific crates. Everything not listed remains subject to the
# lint.
#
# Layer hierarchy:
# - `arvo` (L0) — defines the full numeric / bool substrate; introduces
#   every std primitive that gets wrapped by `UFixed`, `IFixed`,
#   `FastFloat`, `StrictFloat`, `USize`, `Cap`, `Bool`, and the
#   `#[repr(u8)]` strategy markers.
# - `arvo-bits` (L1) — bit-level contracts; introduces `u8` for the
#   `const N: u8` width parameter on `Bits<N>` and `u64` for its storage.
# - Every L2/L3 algorithm crate (`arvo-bitmask`, `arvo-hash`, `arvo-graph`,
#   `arvo-sparse`, `arvo-comb`, `arvo-spectral`) is a consumer of the
#   substrate and introduces nothing, so it stays fully strict.
#
# This explicit map is the belt-and-suspenders path. See mockspace's
# `Config.primitive_introductions` docs for the future auto-detection
# direction (parse DESIGN.md.tmpl or pre-scan `src/**/*.rs` to derive the
# set automatically).

[primitive-introductions]
arvo = [
    "u8", "u16", "u32", "u64", "u128",
    "i8", "i16", "i32", "i64", "i128",
    "f32", "f64",
    "usize", "isize",
    "bool",
]
arvo-bits = ["u8", "u64"]
