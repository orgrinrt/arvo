# Bare-primitive pack lints use their default severity (error at all
# gates). The graceful-ramp ("warn" during the sweep) was removed in
# #126 after the L2/L3 algorithm-crate sweep (#120) and Strategy::NAME
# debug-gate (#125) landed with drift at zero across every enabled
# rule. Re-introduce a ramp only for a fresh round of analogous
# breadth; single-site lint:allow annotations handle narrow cases.

# ---------------------------------------------------------------------------
# Primitive-introductions — per-crate substrate categories introduced
# ---------------------------------------------------------------------------
#
# Maps crate directory name to the list of substrate CATEGORIES the crate
# introduces. When a bare-primitive lint's enforced category appears in a
# crate's list, the lint self-exempts for that crate entirely — the crate
# is the one bringing the substrate to the table, so whatever it does
# internally to define it is legitimate.
#
# Scales without maintenance: adding a new arvo type (new strategy marker,
# new Bits variant, new hash width) doesn't require any lint pack change
# or config change. Adding a genuinely new SUBSTRATE DOMAIN (rare; e.g.
# "temporal") would call for a new category tag.
#
# Known categories (defined by the stack lints pack, not this repo):
#   `numeric`       — UFixed / IFixed / FastFloat / StrictFloat /
#                     USize / Cap / Bool / Bits / ContentHash /
#                     strategy markers.
#   `fallibility`   — Maybe / Outcome / Just (notko).
#   `string`        — Str (hilavitkutin-str).
#   `static-string` — compile-time interned string handles
#                     (hilavitkutin-str). Downstream crates must
#                     gate `const NAME: &str` / `static NAME: &str`
#                     behind `#[cfg(debug_assertions)]` or use
#                     interning in place of a bare literal.
#
# Anti-bypass: adding raw std primitive names (`u32`, `Option`, `String`)
# or arbitrary strings to a crate's list has NO effect — only known
# category tags match. The config is an auditable architectural claim
# ("this crate brings the numeric substrate"), not a permission list.
#
# Layer hierarchy in arvo:
# - `arvo` (L0) — defines the numeric substrate: `UFixed`, `IFixed`,
#   `FastFloat`, `StrictFloat`, `USize`, `Cap`, `Bool`, strategy markers.
# - `arvo-bits` (L1) — supplements the numeric substrate with opaque-bit
#   containers: `Bits<N>`, `BitPrim`, `BitWidth`, `BitAccess`.
# - `arvo-hash` (L2) — supplements the numeric substrate with hash
#   identity: `ContentHash` (alias of `Bits<28>`), plus hasher contracts.
# - Every other crate (`arvo-bitmask`, `arvo-graph`, `arvo-sparse`,
#   `arvo-comb`, `arvo-spectral`) is a consumer of the substrate — stays
#   fully strict.
#
# Future direction (mockspace task #119): auto-detect the categories a
# crate introduces from its DESIGN.md.tmpl / source parse, eliminating
# this manual declaration.

[lint-crates]
mockspace-hilavitkutin-stack-lints = { git = "ssh://git@github.com/orgrinrt/mockspace-hilavitkutin-stack-lints.git", branch = "main" }

[primitive-introductions]
arvo = ["numeric"]
arvo-transparent = ["numeric"]
arvo-strategy = ["numeric"]
arvo-storage = ["numeric"]
arvo-bits-contracts = ["numeric"]
arvo-bits = ["numeric"]
arvo-hash = ["numeric"]
