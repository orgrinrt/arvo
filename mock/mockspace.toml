project_name = "arvo"
crate_prefix = "arvo"
abi_version = 1

proc_macro_crates = []
module_crates = []

# Which macro to track per-crate in domain items
primary_domain_macro = "strategy"
primary_domain_label = "Strategies"

# Layer labels by depth index (L0 → L3)
layers = ["L0 primitives", "L1 contracts", "L2 substrate", "L2 substrate", "L2 substrate", "L2 substrate", "L3 spectral"]

# Domain kind labels for STRUCTURE.md domain items table
[domain_kinds]
strategy = "🎛️ strategy marker"

# Known macros for DESIGN.md table (description | usage)
[known_macros]

# Crate header colors for dependency graph (bg_color | fg_color)
[crate_colors]
arvo = "#E8EEF7 | #3A6EA5"
arvo-bits = "#E8EEF7 | #3A6EA5"
arvo-bitmask = "#E6F2E6 | #2D6A2D"
arvo-tensor = "#E6F2E6 | #2D6A2D"
arvo-hash = "#E6F2E6 | #2D6A2D"
arvo-sparse = "#E6F2E6 | #2D6A2D"
arvo-graph = "#E6F2E6 | #2D6A2D"
arvo-comb = "#E6F2E6 | #2D6A2D"
arvo-spectral = "#EDE6F3 | #5C2D82"

# ---------------------------------------------------------------------------
# Lint configuration
# ---------------------------------------------------------------------------
#
# Per-gate severity: commit (pre-commit hook), build (standalone
# `cargo mock`), push (pre-push hook). Levels: off / info / warn / error.
# Violations at `error` fail the gate. Presets are documented in
# mock/agent/skills/lint-rules/SKILL.md.

# --- Universal quality lints (mockspace built-ins) -------------------------

[lints.no-empty-crate]
commit = "off"
build = "warn"
push = "warn"

[lints.no-todo]
commit = "off"
build = "warn"
push = "error"

[lints.file-size]
commit = "warn"
build = "error"
push = "error"
max_lines = "500"

# --- arvo custom lints (mock/lints/*.rs) -----------------------------------

[lints.no-std-enforcer]
commit = "error"
build = "error"
push = "error"

[lints.no-alloc-enforcer]
commit = "error"
build = "error"
push = "error"

[lints.no-dynamic-dispatch]
commit = "error"
build = "error"
push = "error"

[lints.strategy-marker-required]
commit = "warn"
build = "warn"
push = "error"

[lints.arvo-bits-traits-only]
commit = "error"
build = "error"
push = "error"

[lints.no-runtime-grow]
commit = "warn"
build = "warn"
push = "warn"

# --- Layer enforcement via forbidden-imports -------------------------------
#
# The L0 → L1 → L2 → L3 dependency table from mock/DESIGN.md.tmpl,
# encoded as import rules. A crate violates the rule if it imports
# any path listed under `forbidden` for its scope. {prefix} expands
# to crate_prefix ("arvo").

[lints.forbidden-imports]
commit = "warn"
build = "error"
push = "error"
rules = [
    # L0 — arvo has no intra-arvo deps, and no std/alloc.
    { scope = "arvo", forbidden = "std::*, alloc::*, arvo_bits::*, arvo_bitmask::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "L0 is the root of the arvo stack — no deps and no alloc/std" },

    # L1 — arvo-bits depends on arvo only. No concrete storage.
    { scope = "arvo-bits", forbidden = "std::*, alloc::*, arvo_bitmask::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "L1 contracts depend only on L0 (arvo); concrete storage lives in arvo-bitmask" },

    # L2 — arvo-bitmask depends on arvo-bits only. May depend on arvo-tensor for shared cap_size.
    { scope = "arvo-bitmask", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-bitmask is L2 storage on arvo-bits contracts; must not depend on other L2/L3 crates except arvo-tensor for shared cap_size" },

    # L2 — arvo-tensor. Value-storage peer of arvo-bitmask. Depends on arvo only.
    { scope = "arvo-tensor", forbidden = "std::*, alloc::*, arvo_bits::*, arvo_bitmask::*, arvo_hash::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-tensor is L2 value-storage on arvo L0 only; must not depend on other L1/L2/L3 crates" },

    # L2 — arvo-hash depends on arvo-bits only. Hash-domain types + algo contracts.
    { scope = "arvo-hash", forbidden = "std::*, alloc::*, arvo_bitmask::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-hash is L2 hash-domain surface on arvo-bits contracts; must not depend on other L2/L3 crates" },

    # L2 algorithm crates — depend on arvo + arvo-bitmask + arvo-tensor (not bits directly).
    { scope = "arvo-graph", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_sparse::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-graph depends on arvo + arvo-bitmask + arvo-tensor only" },
    { scope = "arvo-sparse", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_comb::*, arvo_spectral::*", reason = "arvo-sparse depends on arvo + arvo-bitmask + arvo-tensor only" },
    { scope = "arvo-comb", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_sparse::*, arvo_spectral::*", reason = "arvo-comb depends on arvo + arvo-bitmask + arvo-tensor only" },

    # L3 — arvo-spectral depends on arvo + arvo-bitmask + arvo-tensor (Mask64 partition outputs this round, Matrix via arvo-tensor).
    { scope = "arvo-spectral", forbidden = "std::*, alloc::*, arvo_hash::*, arvo_graph::*, arvo_sparse::*, arvo_comb::*", reason = "arvo-spectral depends on arvo + arvo-bitmask + arvo-tensor (Mask64 for partition outputs; Matrix<W, N> for dense storage); arvo-sparse is a future-round dep per BACKLOG" },

    # Universal — no ad-hoc threading, clocks, filesystem anywhere.
    { scope = "*", forbidden = "std::thread::*, std::time::*, std::fs::*, std::net::*, std::process::*, std::io::*", reason = "arvo has zero platform dep; syscalls belong in consumer crates" },
]

# ---------------------------------------------------------------------------
# External lint packs (mockspace #94 feature)
# ---------------------------------------------------------------------------
#
# Shared stack-wide lint rules. Lives as a standalone crate so arvo,
# hilavitkutin, and clause stay in sync on vocabulary discipline.
#
# Git-based dep spec only — committed config must be portable across
# machines. For local iteration use `[patch]` in `.cargo/config.toml`.

[lint-crates]
mockspace-hilavitkutin-stack-lints = { git = "ssh://git@github.com/orgrinrt/mockspace-hilavitkutin-stack-lints.git", branch = "main" }

# Writing-style gate — pre-existing docs trip this until sweeps tidy them.
[lints.writing-style]
severity = "advisory"

# ---------------------------------------------------------------------------
# Graceful ramp for bare-primitive lints (temporary)
# ---------------------------------------------------------------------------
#
# The bare-primitive family fires on 259 pre-existing L2/L3 drift sites in
# arvo-bitmask / arvo-hash / arvo-graph / arvo-sparse / arvo-comb /
# arvo-spectral that were invisible to the previous lib.rs-only lint scope.
# Each is a legitimate target for the upcoming algorithm-crate sweep round;
# none are introductions (arvo L0 and arvo-bits L1 are already exempt via
# [primitive-introductions] below).
#
# Ramp severity to `warn` at every gate while the sweep lands. Commit + push
# succeed with the warning visible; agents still see the violation in local
# cargo mock output. FLIP BACK TO `error` when the L2/L3 sweep completes.
# Tracked: sweep-in-flight rounds under #71 + per-algo-crate follow-ups.

[lints.no-bare-numeric]
severity = "warn"

[lints.arvo-types-only]
severity = "warn"

[lints.no-bare-option]
severity = "warn"

[lints.no-bare-result]
severity = "warn"

[lints.no-bare-string]
severity = "warn"

[lints.no-public-raw-field]
severity = "warn"

# Pre-hilavitkutin-str crates: any `const NAME: &str` / `static NAME:
# &str` must be gated behind `#[cfg(debug_assertions)]`. arvo has
# zero introducers of the `static-string` category (hilavitkutin-str
# lives downstream), so every bare static str here is drift (#125).
[lints.no-bare-static-str]
severity = "warn"

# ---------------------------------------------------------------------------
# Primitive-introductions — per-crate substrate categories introduced
# ---------------------------------------------------------------------------
#
# Maps crate directory name to the list of substrate CATEGORIES the crate
# introduces. When a bare-primitive lint's enforced category appears in a
# crate's list, the lint self-exempts for that crate entirely — the crate
# is the one bringing the substrate to the table, so whatever it does
# internally to define it is legitimate.
#
# Scales without maintenance: adding a new arvo type (new strategy marker,
# new Bits variant, new hash width) doesn't require any lint pack change
# or config change. Adding a genuinely new SUBSTRATE DOMAIN (rare; e.g.
# "temporal") would call for a new category tag.
#
# Known categories (defined by the stack lints pack, not this repo):
#   `numeric`       — UFixed / IFixed / FastFloat / StrictFloat /
#                     USize / Cap / Bool / Bits / ContentHash /
#                     strategy markers.
#   `fallibility`   — Maybe / Outcome / Just (notko).
#   `string`        — Str (hilavitkutin-str).
#   `static-string` — compile-time interned string handles
#                     (hilavitkutin-str). Downstream crates must
#                     gate `const NAME: &str` / `static NAME: &str`
#                     behind `#[cfg(debug_assertions)]` or use
#                     interning in place of a bare literal.
#
# Anti-bypass: adding raw std primitive names (`u32`, `Option`, `String`)
# or arbitrary strings to a crate's list has NO effect — only known
# category tags match. The config is an auditable architectural claim
# ("this crate brings the numeric substrate"), not a permission list.
#
# Layer hierarchy in arvo:
# - `arvo` (L0) — defines the numeric substrate: `UFixed`, `IFixed`,
#   `FastFloat`, `StrictFloat`, `USize`, `Cap`, `Bool`, strategy markers.
# - `arvo-bits` (L1) — supplements the numeric substrate with opaque-bit
#   containers: `Bits<N>`, `BitPrim`, `BitWidth`, `BitAccess`.
# - `arvo-hash` (L2) — supplements the numeric substrate with hash
#   identity: `ContentHash` (alias of `Bits<28>`), plus hasher contracts.
# - Every other crate (`arvo-bitmask`, `arvo-graph`, `arvo-sparse`,
#   `arvo-comb`, `arvo-spectral`) is a consumer of the substrate — stays
#   fully strict.
#
# Future direction (mockspace task #119): auto-detect the categories a
# crate introduces from its DESIGN.md.tmpl / source parse, eliminating
# this manual declaration.

[primitive-introductions]
arvo = ["numeric"]
arvo-bits = ["numeric"]
arvo-hash = ["numeric"]
